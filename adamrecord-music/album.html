<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta property="og:image" content="https://adamrecordmusic.com/adamrecord-music/images/hero-ocean.png">

  <link rel="stylesheet" href="https://use.typekit.net/hpg2amt.css">

</head>
<body class="album-page">

  <!-- SIDEBAR SOCIAL -->
  <div class="sidebar">
    <a href="https://www.instagram.com/adamrecordmusic" target="_blank" class="sidebar-link">Instagram</a>
    <div class="sidebar-line"></div>
  </div>

  <!-- HEADER / NAV -->
  <header>
    <div class="logo">
      <a href="index.html">
        <span class="logo-name">ADAM RECORD</span>
        <span class="logo-sub">Composer</span>
      </a>
    </div>
    <nav>
      <a href="about.html">About</a>
      <a href="music.html" class="active">Music</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main class="album-main">
    <div class="album-player-wrap">
      <div class="back-link"><a href="music.html">← All Albums</a></div>
      <div class="album-player-title" id="albumTitle">Album</div>
      <div class="album-player-meta" id="albumMeta"></div>
      <div class="spotify-embed" id="spotifyEmbed">
        <p class="embed-placeholder">Spotify embed coming soon.</p>
      </div>
    </div>
  </main>

  <script>
    const albums = {
      'thorn-and-thistle':    { title: 'Thorn and Thistle',       meta: '2025 · Single',  spotify: '', colors: ['#b8b8b8','#d4d4d0','#f0efec'] },
      'command':              { title: 'Command',                  meta: '2025 · Single',  spotify: 'https://open.spotify.com/embed/album/6OrHsrZQyHYIHPo0zFDegg?utm_source=generator', colors: ['#e8e8e8','#c0c0c0','#1a1a1a'] },
      'the-new-virtue':       { title: 'The New Virtue',          meta: '2024 · Single',  spotify: 'https://open.spotify.com/embed/album/6fPSi6BDgQbPmt1sYK4Jcp?utm_source=generator', colors: ['#b0c4d4','#e8c8a0','#607080'] },
      'echo-chamber':         { title: 'Echo Chamber',            meta: '2024 · EP',      spotify: 'https://open.spotify.com/embed/album/06Q34luXZiioNZg8vr1sL1?utm_source=generator', colors: ['#6a7a8c','#c4a090','#3a2830'] },
      'the-boy-and-the-bear': { title: 'The Boy and the Bear',    meta: '2024 · Album',   spotify: 'https://open.spotify.com/embed/album/4iIGAUDKCDnOH9Z1Zf2g4s?utm_source=generator', colors: ['#eee8d8','#d8d0c0','#f5f2ea'] },
      'jesus-savior-pilot-me':{ title: 'Jesus, Savior, Pilot Me', meta: '2024 · Single',  spotify: 'https://open.spotify.com/embed/album/05WMugX8dSXKDq8aSvMPZD?utm_source=generator', colors: ['#1e2e28','#2c3e30','#8a7040'] },
      'trifect':              { title: 'Trifect',                  meta: '2024 · Single',  spotify: 'https://open.spotify.com/embed/album/2mmW3T6Vz3wyQMxp5le6GE?utm_source=generator', colors: ['#e8d88a','#c8a870','#a07850'] },
      'dust-storm':           { title: 'Dust Storm',               meta: '2024 · EP',      spotify: 'https://open.spotify.com/embed/album/37tDDz3eR8IHRqwaSj3XGT?utm_source=generator', colors: ['#181818','#302820','#484038'] },
      'stille-2023':          { title: 'Stille (2023 Mix)',        meta: '2023 · Album',   spotify: 'https://open.spotify.com/embed/album/7z86ylotOF3DUoeU9yL2QX?utm_source=generator', colors: ['#e0dcd6','#c0bcb4','#f0eeea'] },
      'cemetary':             { title: 'Cemetary',                 meta: '2023 · Single',  spotify: 'https://open.spotify.com/embed/album/5L5C5OrjqriZ3yLHiKvpen?utm_source=generator', colors: ['#282828','#404040','#181818'] },
      'words':                { title: 'Words',                    meta: '2022 · Single',  spotify: 'https://open.spotify.com/embed/album/5WuXVEonw7Hnu1yS25y6vb?utm_source=generator', colors: ['#8a6030','#3c3428','#282420'] },
      'monsoon':              { title: 'Monsoon',                  meta: '2022 · Single',  spotify: 'https://open.spotify.com/embed/album/6QUKCLvO8Tj25jw2KVxn7a?utm_source=generator', colors: ['#e8c0d0','#c070a0','#8090c8'] },
      'suzanne':              { title: 'Suzanne',                  meta: '2022 · Single',  spotify: 'https://open.spotify.com/embed/album/6u9rYxRTtE22G3kCQkbp9A?utm_source=generator', colors: ['#d8d4c8','#b0b8a0','#e8e4d8'] },
      'eden':                 { title: 'Eden',                     meta: '2021 · Single',  spotify: 'https://open.spotify.com/embed/album/1q8dhiHvJ90G4A2TLfNoZY?utm_source=generator', colors: ['#1e1c18','#2e2a22','#c0a060'] },
      'bleak-midwinter':      { title: 'Bleak Midwinter',         meta: '2020 · EP',      spotify: 'https://open.spotify.com/embed/album/7aKTlpu7S1YmjZCTrq4kBP?utm_source=generator', colors: ['#c8b890','#a09070','#8898a8'] },
      'even-on-calm-waters':  { title: 'Even on Calm Waters',     meta: '2020 · Album',   spotify: 'https://open.spotify.com/embed/album/2PcrFCRgAQMK3rGC65bcZQ?utm_source=generator', colors: ['#8ab0c8','#506878','#c0b090'] },
      'rifle':                { title: 'Rifle',                    meta: '2018 · Album',   spotify: 'https://open.spotify.com/embed/album/2Vv2VELNCBgAiM0uo9bQhO?utm_source=generator', colors: ['#e8e4d8','#a8b4a8','#6a7868'] },
      'stille':               { title: 'Stille',                   meta: '2016 · Album',   spotify: 'https://open.spotify.com/embed/album/0QcujYSf9R0KUhtNiD98vl?utm_source=generator', colors: ['#dcdad4','#b8b6b0','#f0eee8'] },
    };

    // Convert hex to RGB
    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return { r, g, b };
    }

    // Calculate luminance (0 = black, 1 = white)
    function luminance({ r, g, b }) {
      const a = [r, g, b].map(v => {
        v /= 255;
        return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
      });
      return 0.2126 * a[0] + 0.7152 * a[1] + 0.0722 * a[2];
    }

    // Average luminance across all album colors
    function avgLuminance(colors) {
      const total = colors.reduce((sum, hex) => sum + luminance(hexToRgb(hex)), 0);
      return total / colors.length;
    }

    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const album = albums[id];

    if (album) {
      document.title = album.title + ' — Adam Record';
      document.getElementById('albumTitle').textContent = album.title;
      document.getElementById('albumMeta').textContent = album.meta;

      // Inject aurora keyframes
      const keyframes = document.createElement('style');
      keyframes.textContent = `
        @keyframes aurora {
          0%   { background-position: 0% 50%; }
          50%  { background-position: 100% 50%; }
          100% { background-position: 0% 50%; }
        }
      `;
      document.head.appendChild(keyframes);

      // Apply animated gradient
      const [c1, c2, c3] = album.colors;
      document.body.style.background = `linear-gradient(135deg, ${c1}, ${c2}, ${c3}, ${c1})`;
      document.body.style.backgroundSize = '400% 400%';
      document.body.style.animation = 'aurora 20s ease infinite';

      // Contrast-aware text
      const lum = avgLuminance(album.colors);
      const textColor = lum > 0.35 ? '#111111' : '#f8f7f4';
      const mutedColor = lum > 0.35 ? 'rgba(0,0,0,0.45)' : 'rgba(255,255,255,0.55)';

      const contrastStyle = document.createElement('style');
      contrastStyle.textContent = `
        body, body a, .logo-name, .album-player-title { color: ${textColor} !important; }
        nav a, .logo-sub, .album-player-meta, .sidebar-link, .back-link a { color: ${mutedColor} !important; }
        nav a:hover, nav a.active { color: ${textColor} !important; }
        nav a.active::after { background: ${textColor} !important; }
        .sidebar-line { background: ${mutedColor} !important; }
        .hero-link { border-color: ${textColor} !important; }
      `;
      document.head.appendChild(contrastStyle);

      if (album.spotify) {
        document.getElementById('spotifyEmbed').innerHTML =
          `<iframe style="border-radius:12px" src="${album.spotify}" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>`;
      }
    }
  </script>

</body>
</html>
