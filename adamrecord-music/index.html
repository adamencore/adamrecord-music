<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adam Record</title>
  <link rel="stylesheet" href="https://use.typekit.net/hpg2amt.css">
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── HERO MOSAIC ── */
    .home-main {
      position: relative;
      width: 100vw;
      min-height: 100vh;
      padding-top: 90px; /* clear the fixed header */
    }

    .mosaic {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 50vh 50vh;
      gap: 8px;
      padding: 0 8px 8px 8px;
    }

    .mosaic-panel {
      overflow: hidden;
      position: relative;
    }

    .mosaic-panel img {
      width: 115%;
      height: 115%;
      object-fit: cover;
      display: block;
      transition: transform 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      transform: translate(-5%, -5%);
    }

    @keyframes driftA { 0%,100% { transform: translate(-5%,-5%); } 50% { transform: translate(-8%,-7%); } }
    @keyframes driftB { 0%,100% { transform: translate(-5%,-5%); } 50% { transform: translate(-2%,-7%); } }
    @keyframes driftC { 0%,100% { transform: translate(-5%,-5%); } 50% { transform: translate(-8%,-2%); } }
    @keyframes driftD { 0%,100% { transform: translate(-5%,-5%); } 50% { transform: translate(-2%,-2%); } }

    .mosaic-panel:nth-child(1) img { animation: driftA 14s ease-in-out infinite; }
    .mosaic-panel:nth-child(2) img { animation: driftB 17s ease-in-out infinite; }
    .mosaic-panel:nth-child(3) img { animation: driftC 19s ease-in-out infinite; }
    .mosaic-panel:nth-child(4) img { animation: driftD 15s ease-in-out infinite; }

    .mosaic-panel:nth-child(1):hover img { transform: translate(-8%, -8%) scale(1.02); }
    .mosaic-panel:nth-child(2):hover img { transform: translate(-2%, -8%) scale(1.02); }
    .mosaic-panel:nth-child(3):hover img { transform: translate(-8%, -2%) scale(1.02); }
    .mosaic-panel:nth-child(4):hover img { transform: translate(-2%, -2%) scale(1.02); }
  </style>
</head>
<body>

  <!-- SIDEBAR SOCIAL -->
  <div class="sidebar">
    <a href="https://www.instagram.com/adamrecordmusic" target="_blank" class="sidebar-link">Instagram</a>
    <div class="sidebar-line"></div>
  </div>

  <!-- HEADER / NAV -->
  <header>
    <div class="logo">
      <a href="index.html">
        <span class="logo-name">ADAM RECORD</span>
        <span class="logo-sub">Composer</span>
      </a>
    </div>
    <nav>
      <a href="about.html">About</a>
      <a href="music.html">Music</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <!-- HOME HERO -->
  <main class="home-main">
    <div class="mosaic">
      <div class="mosaic-panel"><img src="images/hero-ocean.png" alt=""></div>
      <div class="mosaic-panel"><img src="images/hero-canoe.png" alt=""></div>
      <div class="mosaic-panel"><img src="images/hero-mist.png" alt=""></div>
      <div class="mosaic-panel"><img src="images/hero-winter.png" alt=""></div>
    </div>
  </main>

</body>
</html>
