<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adam Record</title>
  <link rel="stylesheet" href="https://use.typekit.net/hpg2amt.css">
  <link rel="stylesheet" href="style.css" />
  <style>
    .home-main {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .mosaic {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 12px;
      padding: 12px;
      height: 100%;
      box-sizing: border-box;
    }

    .mosaic-panel {
      overflow: hidden;
      position: relative;
    }

    .mosaic-panel img {
      width: 120%;
      height: 120%;
      object-fit: cover;
      display: block;
      transform: translate(-8%, -8%);
      transform-origin: center center;
    }

    @keyframes cinematicA {
      0%   { transform: translate(-8%, -8%) scale(1); }
      50%  { transform: translate(-10%, -9%) scale(1.04); }
      100% { transform: translate(-8%, -8%) scale(1); }
    }
    @keyframes cinematicB {
      0%   { transform: translate(-8%, -8%) scale(1.03); }
      50%  { transform: translate(-6%, -7%) scale(1); }
      100% { transform: translate(-8%, -8%) scale(1.03); }
    }
    @keyframes cinematicC {
      0%   { transform: translate(-8%, -8%) scale(1); }
      50%  { transform: translate(-9%, -6%) scale(1.05); }
      100% { transform: translate(-8%, -8%) scale(1); }
    }
    @keyframes cinematicD {
      0%   { transform: translate(-8%, -8%) scale(1.02); }
      50%  { transform: translate(-7%, -9%) scale(1); }
      100% { transform: translate(-8%, -8%) scale(1.02); }
    }

    .mosaic-panel:nth-child(1) img { animation: cinematicA 18s ease-in-out infinite; }
    .mosaic-panel:nth-child(2) img { animation: cinematicB 22s ease-in-out infinite; }
    .mosaic-panel:nth-child(3) img { animation: cinematicC 20s ease-in-out infinite; }
    .mosaic-panel:nth-child(4) img { animation: cinematicD 24s ease-in-out infinite; }

    .mosaic-panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center,
        transparent 55%,
        rgba(255,255,255,0.15) 100%);
      z-index: 2;
      pointer-events: none;
    }

    .hero-listen {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-family: "instrument-serif", sans-serif;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #111;
      border-bottom: 1px solid #111;
      padding-bottom: 2px;
      transition: opacity 0.2s;
      mix-blend-mode: multiply;
    }

    .hero-listen:hover { opacity: 0.4; }

    @media (max-width: 768px) {
      .mosaic {
        grid-template-columns: 1fr;
        grid-template-rows: repeat(4, 25vh);
        gap: 8px;
        padding: 8px;
      }
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <a href="https://www.instagram.com/adamrecordmusic" target="_blank" class="sidebar-link">Instagram</a>
    <div class="sidebar-line"></div>
  </div>

  <header>
    <div class="logo">
      <a href="index.html">
        <span class="logo-name">ADAM RECORD</span>
        <span class="logo-sub">Composer</span>
      </a>
    </div>
    <nav>
      <a href="about.html">About</a>
      <a href="music.html">Music</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main class="home-main">
    <div class="mosaic">
      <div class="mosaic-panel">
        <img src="images/hero-ocean.png" alt="">
      </div>
      <div class="mosaic-panel">
        <img src="images/hero-canoe.png" alt="">
      </div>
      <div class="mosaic-panel">
        <img src="images/hero-mist.png" alt="">
      </div>
      <div class="mosaic-panel">
        <img src="images/hero-winter.png" alt="">
      </div>
    </div>

    <a href="music.html" class="hero-listen">Listen</a>
  </main>

</body>
</html>
